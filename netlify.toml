[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://zesty-centaur-04fe4d.netlify.app/*"
  to = "https://www.alexandrostzikas.gr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/"
  to = "/el/"
  status = 301
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
